<!DOCTYPE html>
<html>
<head>
  <title>Activate foodeal Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    input { padding: 12px; width: 80%; font-size: 16px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; }
    
    button { 
      background: #000; 
      color: #fff; 
      padding: 12px 24px; 
      font-size: 16px; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      transition: transform 0.1s ease, background 0.1s ease; /* Adds smooth motion */
    }
    
    /* This creates the visual click/tap animation */
    button:active {
      transform: scale(0.95);
      background: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to foodeal</h1>
    <p>Enter your full name to link this card to your account.</p>
    <input type="text" id="customerName" placeholder="Your Full Name">
    <br>
    <button onclick="activate()">Activate Membership</button>
    <div id="status" style="margin-top: 20px; font-weight: bold;"></div>
  </div>

  <script>
    // FIXED: Renamed to supabaseClient to prevent variable crashing
    const supabaseClient = supabase.createClient('https://biyrentzsvjfhslcneap.supabase.co/rest/v1/', 'sb_publishable_1n8pAIefto8v5gzlJHI2DQ_tWGgl5R_');
    const cardId = new URLSearchParams(window.location.search).get('id');

    async function activate() {
      const name = document.getElementById('customerName').value;
      if (!name) return alert("Please enter a name");
      
      document.getElementById('status').innerText = "Activating...";
      document.getElementById('status').style.color = "black";
      
      const { error } = await supabaseClient
        .from('members')
        .update({ name: name, is_active: true })
        .eq('id', cardId);

      if (error) {
        document.getElementById('status').innerText = "❌ Error: " + error.message;
        document.getElementById('status').style.color = "red";
      } else {
        document.getElementById('status').innerText = "✅ Card Activated! You can close this page.";
        document.getElementById('status').style.color = "green";
      }
    }
  </script>
</body>
</html>
