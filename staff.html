<!DOCTYPE html>
<html>
<head>
  <title>foodeal Loyalty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* =========================================
       FOODEAL BRAND COLORS: Yellow & Black
       ========================================= */
    :root {
      --brand-primary: #FFD700;
      --brand-hover: #E6C200;
      --bg-color: #000000;
      --card-bg: #141414;
      --text-main: #ffffff;
      --input-bg: #222222;
      --border-color: #333333;
      --btn-text: #000000;
    }

    body { 
      font-family: sans-serif; 
      text-align: center; 
      background: var(--bg-color); 
      color: var(--text-main); 
      padding: 20px; 
    }
    
    .card { 
      background: var(--card-bg); 
      max-width: 400px; 
      margin: 40px auto; 
      padding: 30px; 
      border-radius: 16px; 
      border: 1px solid var(--border-color); 
    }
    
    input[type="tel"], input[type="text"], input[type="email"] { 
      padding: 15px; 
      width: 100%; 
      font-size: 18px; 
      margin: 10px 0; 
      border-radius: 8px; 
      border: 1px solid var(--border-color); 
      background: var(--input-bg); 
      color: var(--text-main); 
      box-sizing: border-box; 
      outline: none;
    }
    
    input:focus {
      border-color: var(--brand-primary);
    }

    /* Consent Checkbox Styles */
    .consent-container {
      display: flex;
      align-items: flex-start;
      text-align: left;
      margin: 15px 0;
      font-size: 13px;
      color: #aaa;
      gap: 10px;
    }

    .consent-container input[type="checkbox"] {
      margin-top: 3px;
      width: 18px;
      height: 18px;
      accent-color: var(--brand-primary);
      cursor: pointer;
    }
    
    button { 
      background: var(--brand-primary); 
      color: var(--btn-text); 
      padding: 15px; 
      width: 100%; 
      font-size: 18px; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: bold; 
      transition: transform 0.1s ease, background 0.1s ease; 
      margin-top: 10px;
    }
    
    button:active { 
      transform: scale(0.95); 
      background: var(--brand-hover); 
    }
    
    .brand-text {
      color: var(--brand-primary);
    }
    
    .hidden { display: none !important; }
    .error { margin-top: 15px; font-size: 14px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="card" id="authView">
    <h1>Welcome to <span class="brand-text">foodeal</span></h1>
    
    <input type="tel" id="phone" placeholder="Phone (e.g. 9025550199)" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    
    <div id="newSignupFields" class="hidden">
       <input type="text" id="name" placeholder="Full Name">
       <input type="email" id="email" placeholder="Email Address">
       
       <label class="consent-container">
         <input type="checkbox" id="consentBox">
         <span>I agree to provide my information to join the foodeal loyalty program and consent to receiving account and marketing updates.</span>
       </label>
    </div>
    
    <button onclick="handleAuth()" id="authBtn">Continue</button>
    <div id="errorMsg" class="error"></div>
  </div>

  <div class="card hidden" id="statusView">
    <h2 id="welcomeMsg">Welcome</h2>
    
    <div id="rankBadge" style="display: inline-block; background: #333; color: var(--brand-primary); padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; text-transform: uppercase; margin-top: -10px;">STANDARD</div>
    
    <div style="font-size: 48px; font-weight: bold; margin: 20px 0;" class="brand-text" id="pts">0</div>
    <p style="color: #aaa;">Loyalty Points</p>
    <button onclick="location.reload()" style="background: #333; color: white; margin-top: 30px;">Sign Out</button>
  </div>

  <script>
    const supabaseClient = supabase.createClient('https://biyrentzsvjfhslcneap.supabase.co', 'sb_publishable_1n8pAIefto8v5gzlJHI2DQ_tWGgl5R_');

    let isNewUser = false;
    let isUpdatingEmail = false;

    async function handleAuth() {
      const rawPhone = document.getElementById('phone').value.trim();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const consentBox = document.getElementById('consentBox').checked;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('authBtn');

      errorMsg.innerText = "";

      if (!rawPhone) {
        errorMsg.innerText = "❌ Phone number is required.";
        errorMsg.style.color = "#ff4444";
        return;
      }

      const phone = rawPhone.replace(/[^0-9]/g, '');

      if (phone.length < 10) {
         errorMsg.innerText = "❌ Phone number must be at least 10 digits.";
         errorMsg.style.color = "#ff4444";
         return;
      }

      btn.innerText = "Checking...";
      btn.disabled = true;

      if (isUpdatingEmail) {
         if (!email || !email.includes('@')) {
            errorMsg.innerText = "❌ A valid email is required to continue.";
            errorMsg.style.color = "#ff4444";
            btn.innerText = "Save Email";
            btn.disabled = false;
            return;
         }
         
         const { data: updatedUser, error: updateError } = await supabaseClient
            .from('members')
            .update({ email: email })
            .eq('phone', phone)
            .select()
            .single();
            
         if (updateError) {
            errorMsg.innerText = "❌ Update failed: " + updateError.message;
            errorMsg.style.color = "#ff4444";
            btn.innerText = "Save Email";
            btn.disabled = false;
            return;
         }
         showProfile(updatedUser);
         return;
      }

      if (isNewUser) {
         if (!name || !email || !email.includes('@')) {
            errorMsg.innerText = "❌ Name and a valid Email are required.";
            errorMsg.style.color = "#ff4444";
            btn.innerText = "Complete Sign Up";
            btn.disabled = false;
            return;
         }

         // The Legal Check: Make sure the box is ticked
         if (!consentBox) {
            errorMsg.innerText = "❌ You must agree to the terms to join.";
            errorMsg.style.color = "#ff4444";
            btn.innerText = "Complete Sign Up";
            btn.disabled = false;
            return;
         }

         const { data: newUser, error: insertError } = await supabaseClient
            .from('members')
            .insert([{ phone: phone, name: name, email: email, points: 0 }])
            .select()
            .single();

         if (insertError) {
            errorMsg.innerText = "❌ Registration failed: " + insertError.message;
            errorMsg.style.color = "#ff4444";
            btn.innerText = "Complete Sign Up";
            btn.disabled = false;
            return;
         }
         showProfile(newUser);
         return;
      }
      
      let { data: user, error: searchError } = await supabaseClient
        .from('members')
        .select('*')
        .eq('phone', phone)
        .maybeSingle(); 

      if (searchError) {
         errorMsg.innerText = "Database error: " + searchError.message;
         errorMsg.style.color = "#ff4444";
         btn.innerText = "Continue";
         btn.disabled = false;
         return;
      }

      if (user) {
         if (!user.email) {
            isUpdatingEmail = true;
            document.getElementById('email').classList.remove('hidden');
            btn.innerText = "Save Email";
            btn.disabled = false;
            errorMsg.innerText = "Please add an email address to secure your account.";
            errorMsg.style.color = "var(--brand-primary)";
            return;
         }
         showProfile(user);
         return;
      }

      isNewUser = true;
      document.getElementById('newSignupFields').classList.remove('hidden');
      btn.innerText = "Complete Sign Up";
      btn.disabled = false;
      errorMsg.innerText = "Phone not found. Please register to continue.";
      errorMsg.style.color = "var(--brand-primary)"; 
    }

    function showProfile(userData) {
      document.getElementById('welcomeMsg').innerText = "Hello, " + userData.name;
      document.getElementById('pts').innerText = userData.points;
      document.getElementById('rankBadge').innerText = userData.tier || 'STANDARD';
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('statusView').classList.remove('hidden');
    }
  </script>
</body>
</html>
