<!doctype html>
<html>
  <head>
    <title>foodeal Membership</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 50px;
      }
      #qrcode {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>foodeal Member Card</h1>
    <div id="qrcode"></div>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const memberId =
        urlParams.get("id") || "123e4567-e89b-12d3-a456-426614174000";

      new QRCode(document.getElementById("qrcode"), {
        text: memberId,
        width: 250,
        height: 250,
      });
    </script>
  </body>
</html>
