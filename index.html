<!DOCTYPE html>
<html>
<head>
  <title>foodeal Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
    .card { background: #1e1e1e; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 16px; border: 1px solid #333; }
    input { padding: 15px; width: 100%; font-size: 18px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
    button { background: #4caf50; color: white; padding: 15px; width: 100%; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="card" id="authView">
    <h1>Welcome to foodeal</h1>
    <input type="tel" id="phone" placeholder="Phone (e.g. 9025550199)">
    <input type="text" id="name" placeholder="Full Name (for new signups)">
    <button onclick="handleLogin()">Sign In / Sign Up</button>
  </div>

  <div class="card hidden" id="statusView">
    <h2 id="welcomeMsg">Welcome</h2>
    <div style="font-size: 40px;" id="pts">0</div>
    <p>Loyalty Points</p>
  </div>

  <script>
    const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

    async function handleLogin() {
      const phone = document.getElementById('phone').value;
      const name = document.getElementById('name').value;
      
      // 1. Check if user exists in Supabase
      let { data: user, error } = await supabase
        .from('members')
        .select('*')
        .eq('phone', phone)
        .single();

      // 2. If no user, sign them up in Supabase
      if (!user) {
        const { data: newUser, error: signupError } = await supabase
          .from('members')
          .insert([{ phone, name, points: 0 }])
          .select()
          .single();
        user = newUser;
      }

      // 3. Display user data
      document.getElementById('welcomeMsg').innerText = "Hello, " + user.name;
      document.getElementById('pts').innerText = user.points;
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('statusView').classList.remove('hidden');
    }
  </script>
</body>
</html>
